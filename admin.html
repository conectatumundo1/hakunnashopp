<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HAKUNA!! — Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;700&family=DM+Mono:wght@300;400&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --paper:#f7f4ef;--paper2:#f0ece4;--paper3:#e9e4da;
      --ink:#1a1814;--ink2:#2e2b26;
      --vermilion:#c0392b;--vermilion2:#e74c3c;
      --green:#2d7a4a;
      --ash:#9a9488;--smoke:#d4cfc6;--smoke2:#e8e3da;--charcoal:#4a4640;
      --hp:#7b2d8b;
    }
    body{background:var(--paper);color:var(--ink);font-family:'Noto Sans JP',sans-serif;font-weight:300;min-height:100vh;}

    /* ── HEADER ── */
    header{
      background:rgba(26,24,20,0.97);
      border-bottom:1px solid rgba(255,255,255,0.07);
      display:flex;justify-content:space-between;align-items:center;
      padding:0 3rem;height:62px;position:sticky;top:0;z-index:10;
    }
    .logo-wrap{display:flex;align-items:center;gap:.85rem;text-decoration:none;}
    .logo-img{width:42px;height:42px;object-fit:contain;filter:drop-shadow(1px 1px 4px rgba(255,255,255,0.5));}
    .logo-jp{font-family:'Shippori Mincho',serif;font-size:1.1rem;font-weight:700;letter-spacing:.06em;color:#fff;}
    .hright{display:flex;gap:.6rem;align-items:center;}
    .tag{
      font-family:'DM Mono',monospace;
      font-size:.58rem;letter-spacing:.18em;text-transform:uppercase;
      color:rgba(255,255,255,.4);background:rgba(255,255,255,.06);
      padding:.25rem .8rem;border:1px solid rgba(255,255,255,.12);
    }
    .gbtn{
      background:none;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.6);
      padding:.32rem .9rem;font-family:'DM Mono',monospace;
      font-size:.62rem;font-weight:400;cursor:pointer;letter-spacing:.08em;
      text-transform:uppercase;transition:all .2s;text-decoration:none;display:inline-block;
    }
    .gbtn:hover{border-color:rgba(255,255,255,.5);color:#fff;}
    .gbtn.danger:hover{border-color:var(--vermilion2);color:var(--vermilion2);}

    /* ── LAYOUT ── */
    .wrap{max-width:1280px;margin:0 auto;padding:2.5rem 3rem;display:grid;grid-template-columns:360px 1fr;gap:3rem;align-items:start;}

    /* ── FORM ── */
    .form-panel{background:var(--paper);border:1px solid var(--smoke);padding:2.2rem;position:sticky;top:74px;}
    .form-panel::before{content:'';display:block;height:1px;background:var(--vermilion);margin:-2.2rem -2.2rem 2rem;}
    .fp-eyebrow{
      font-family:'DM Mono',monospace;font-size:.58rem;
      letter-spacing:.22em;text-transform:uppercase;
      color:var(--vermilion);margin-bottom:.5rem;
      display:flex;align-items:center;gap:.5rem;
    }
    .fp-eyebrow::before{content:'';display:block;width:16px;height:1px;background:var(--vermilion);}
    .fp-title{
      font-family:'Shippori Mincho',serif;
      font-size:1.35rem;font-weight:600;margin-bottom:1.8rem;letter-spacing:.02em;
    }

    .fg{margin-bottom:1rem}
    label{
      display:block;font-family:'DM Mono',monospace;
      font-size:.58rem;letter-spacing:.16em;text-transform:uppercase;
      color:var(--ash);margin-bottom:.4rem;
    }
    input[type=text],input[type=number],select{
      width:100%;background:var(--paper2);border:1px solid var(--smoke);
      color:var(--ink);padding:.68rem .95rem;
      font-family:'Noto Sans JP',sans-serif;font-size:.88rem;font-weight:300;
      outline:none;transition:border .2s;
    }
    input:focus,select:focus{border-color:var(--ink);}
    input::placeholder{color:var(--smoke);}
    select option{background:var(--paper2);}

    /* ── IMAGE UPLOAD ── */
    .img-upload-area{
      position:relative;
      width:100%;
      border:1px dashed var(--smoke);
      background:var(--paper2);
      cursor:pointer;
      transition:border-color .2s;
      min-height:120px;
      display:flex;align-items:center;justify-content:center;
    }
    .img-upload-area:hover{border-color:var(--charcoal);}
    .img-upload-area input[type=file]{
      position:absolute;inset:0;width:100%;height:100%;
      opacity:0;cursor:pointer;z-index:2;
      padding:0;border:none;background:none;
    }
    .img-placeholder{
      display:flex;flex-direction:column;align-items:center;
      gap:.5rem;padding:1.5rem;pointer-events:none;
      font-family:'DM Mono',monospace;
      font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;
      color:var(--ash);text-align:center;
    }
    .img-placeholder .icon{font-size:1.8rem;opacity:.5;}
    .img-preview{
      display:none;width:100%;max-height:220px;
      object-fit:contain;border:1px solid var(--smoke);
      background:var(--paper2);margin-top:.5rem;
    }
    .img-preview.show{display:block;}
    .img-clear-btn{
      display:none;width:100%;margin-top:.3rem;padding:.4rem;
      border:1px solid rgba(192,57,43,.2);background:none;
      font-family:'DM Mono',monospace;font-size:.58rem;
      letter-spacing:.1em;text-transform:uppercase;
      color:rgba(192,57,43,.6);cursor:pointer;transition:all .2s;
    }
    .img-clear-btn:hover{border-color:var(--vermilion);color:var(--vermilion);}
    .img-clear-btn.show{display:block;}

    .check-row{display:flex;align-items:center;gap:.6rem;margin-top:.35rem;}
    .check-row input[type=checkbox]{
      width:15px;height:15px;accent-color:var(--vermilion);
      border:1px solid var(--smoke);cursor:pointer;flex-shrink:0;
    }
    .check-row span{font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.06em;color:var(--charcoal);}

    .save-btn{
      width:100%;background:var(--ink);color:var(--paper);border:none;
      padding:.9rem;font-family:'DM Mono',monospace;
      font-size:.68rem;letter-spacing:.16em;text-transform:uppercase;
      cursor:pointer;transition:background .2s;margin-top:.5rem;
    }
    .save-btn:hover{background:var(--ink2);}
    .save-btn.edit-mode{background:var(--green);}
    .cancel-btn{
      display:none;width:100%;margin-top:.4rem;padding:.65rem;
      border:1px solid var(--smoke);background:none;
      font-family:'DM Mono',monospace;font-size:.62rem;
      letter-spacing:.1em;text-transform:uppercase;
      color:var(--ash);cursor:pointer;transition:all .2s;
    }
    .cancel-btn:hover{border-color:var(--charcoal);color:var(--ink);}
    .ok-msg{
      display:none;text-align:center;color:var(--green);
      font-family:'DM Mono',monospace;font-size:.6rem;
      letter-spacing:.1em;text-transform:uppercase;
      margin-top:.7rem;padding:.5rem;
      border:1px solid rgba(45,122,74,.2);background:rgba(45,122,74,.04);
    }

    /* ── PRODUCTS PANEL ── */
    .prod-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:1.2rem;}
    .prod-header h2{font-family:'Shippori Mincho',serif;font-size:1.4rem;font-weight:500;}
    .count{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--ash);}

    .search-wrap{margin-bottom:1.2rem;}
    .search-wrap input{
      width:100%;background:var(--paper);border:1px solid var(--smoke);
      color:var(--ink);padding:.62rem 1rem;
      font-family:'DM Mono',monospace;font-size:.8rem;
      outline:none;transition:border .2s;
    }
    .search-wrap input:focus{border-color:var(--ink);}
    .search-wrap input::placeholder{color:var(--smoke);}

    .prod-table{border:1px solid var(--smoke);}
    .prod-table-head{
      display:grid;grid-template-columns:52px 1fr 110px 72px 72px;
      gap:1rem;padding:.6rem 1.1rem;
      background:var(--paper2);border-bottom:1px solid var(--smoke);
    }
    .th{font-family:'DM Mono',monospace;font-size:.56rem;letter-spacing:.16em;text-transform:uppercase;color:var(--ash);}
    .prow{
      display:grid;grid-template-columns:52px 1fr 110px 72px 72px;
      gap:1rem;padding:.85rem 1.1rem;align-items:center;
      border-bottom:1px solid var(--smoke2);transition:background .15s;
    }
    .prow:last-child{border-bottom:none;}
    .prow:hover{background:var(--paper2);}
    .prow-img{width:52px;height:52px;object-fit:cover;border:1px solid var(--smoke2);}
    .prow-emoji-fallback{font-size:1.7rem;text-align:center;width:52px;height:52px;display:flex;align-items:center;justify-content:center;background:var(--paper2);}
    .prow-name{font-family:'Shippori Mincho',serif;font-size:.92rem;font-weight:500;margin-bottom:.2rem;}
    .prow-meta{display:flex;gap:.4rem;flex-wrap:wrap;margin-top:.2rem;}
    .pill{font-family:'DM Mono',monospace;font-size:.55rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ash);border:1px solid var(--smoke);padding:.1rem .4rem;}
    .pill-anime{font-family:'DM Mono',monospace;font-size:.55rem;letter-spacing:.1em;text-transform:uppercase;color:var(--vermilion);border:1px solid rgba(192,57,43,.25);padding:.1rem .4rem;}
    .pill-new{font-family:'DM Mono',monospace;font-size:.55rem;letter-spacing:.1em;text-transform:uppercase;color:var(--charcoal);border:1px solid var(--charcoal);padding:.1rem .4rem;}
    .pill-hp{font-family:'DM Mono',monospace;font-size:.55rem;letter-spacing:.1em;text-transform:uppercase;color:var(--hp);border:1px solid rgba(123,45,139,.35);padding:.1rem .4rem;background:rgba(123,45,139,.05);}
    .prow-price{font-family:'Shippori Mincho',serif;font-size:1rem;font-weight:600;color:var(--ink);}
    .ebtn,.dbtn{
      background:none;border:1px solid var(--smoke);
      font-family:'DM Mono',monospace;font-size:.58rem;
      letter-spacing:.08em;text-transform:uppercase;
      cursor:pointer;padding:.32rem .6rem;transition:all .2s;white-space:nowrap;
    }
    .ebtn{color:var(--ash);}
    .ebtn:hover{border-color:var(--ink);color:var(--ink);}
    .dbtn{color:rgba(192,57,43,.5);border-color:rgba(192,57,43,.2);}
    .dbtn:hover{border-color:var(--vermilion);color:var(--vermilion);background:rgba(192,57,43,.03);}

    .empty-state{text-align:center;padding:4rem;color:var(--ash);}
    .empty-state .icon{font-size:1.5rem;margin-bottom:1rem;opacity:.4;font-family:'DM Mono',monospace;}
    .empty-state p{font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;}
    .loading-state{text-align:center;padding:3rem;color:var(--ash);font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;}

    /* ── RESPONSIVE ── */
    @media(max-width:960px){
      header{padding:0 1.2rem;}
      .wrap{grid-template-columns:1fr;padding:1.5rem 1.2rem;gap:2rem;}
      .form-panel{position:static;}
      .prod-table-head{display:none;}
      .prow{grid-template-columns:42px 1fr auto auto;gap:.6rem;}
      .prow-price{display:none;}
    }

    @media(max-width:600px){
      header{height:56px;padding:0 1rem;}
      .logo-img{width:34px;height:34px;}
      .logo-jp{font-size:.95rem;}
      .tag{display:none;}
      .gbtn{padding:.28rem .7rem;font-size:.58rem;}

      .wrap{padding:1.2rem .9rem;gap:1.5rem;}
      .form-panel{padding:1.5rem 1.2rem;}
      .form-panel::before{margin:-1.5rem -1.2rem 1.5rem;}

      /* imagen upload en movil */
      .img-upload-area{min-height:100px;}
      .img-placeholder{padding:1rem;font-size:.58rem;}
      .img-preview{max-height:180px;}

      input[type=text],input[type=number],select{
        font-size:.85rem;padding:.6rem .8rem;
      }
      .save-btn,.cancel-btn{padding:.8rem;font-size:.64rem;}

      .prow{grid-template-columns:38px 1fr auto;gap:.5rem;padding:.7rem .8rem;}
      .prow-img,.prow-emoji-fallback{width:38px;height:38px;font-size:1.3rem;}
      .prow-name{font-size:.82rem;}
      .dbtn{display:none;}
      .ebtn{padding:.28rem .5rem;font-size:.55rem;}
    }

    @media(max-width:380px){
      .wrap{padding:1rem .7rem;}
      .form-panel{padding:1.2rem 1rem;}
      .form-panel::before{margin:-1.2rem -1rem 1.2rem;}
      .fp-title{font-size:1.1rem;}
    }
  </style>
</head>
<body>

<header>
  <a class="logo-wrap" href="index.html">
    <img src="logosinfondo.png" alt="Hakunna Shop" class="logo-img"/>
    <div class="logo-jp">HAKUNNA CMS</div>
  </a>
  <div class="hright">
    <span class="tag">Admin</span>
    <a class="gbtn" href="index.html">Ver tienda</a>
    <button class="gbtn danger" onclick="logout()">Salir</button>
  </div>
</header>

<div class="wrap">

  <!-- FORM -->
  <div class="form-panel">
    <div class="fp-eyebrow" id="fp-eyebrow">Nuevo producto</div>
    <h2 class="fp-title" id="fp-title">Agregar al catálogo</h2>
    <input type="hidden" id="edit-id"/>

    <div class="fg">
      <label>Nombre</label>
      <input type="text" id="f-nombre" placeholder="Ej: Figura Naruto Sage Mode 25cm"/>
    </div>
    <div class="fg">
      <label>Anime / Serie</label>
      <input type="text" id="f-anime" placeholder="Ej: Naruto, One Piece..." list="anime-dl" autocomplete="off"/>
      <datalist id="anime-dl"></datalist>
    </div>
    <div class="fg">
      <label>Precio ($ UY)</label>
      <input type="number" id="f-precio" placeholder="1890" min="0"/>
    </div>
    <div class="fg">
      <label>Categoría</label>
      <select id="f-cat">
        <option value="figura">Figura de colección</option>
        <option value="funko">Funko Pop</option>
        <option value="ropa">Ropa</option>
        <option value="accesorio">Accesorio</option>
        <option value="poster">Poster / Arte</option>
        <option value="otro">Otro</option>
      </select>
    </div>

    <div class="fg">
      <label>Imagen del producto</label>
      <div class="img-upload-area" id="img-upload-area">
        <input type="file" id="f-img-file" accept="image/*" onchange="handleImageUpload(event)"/>
        <div class="img-placeholder" id="img-placeholder">
          <span class="icon">🖼</span>
          Tocá para subir imagen
        </div>
      </div>
      <img class="img-preview" id="img-preview" alt="Preview"/>
      <button class="img-clear-btn" id="img-clear-btn" type="button" onclick="clearImage()">✕ Quitar imagen</button>
      <input type="hidden" id="f-imagen" value=""/>
    </div>

    <div class="fg">
      <div class="check-row">
        <input type="checkbox" id="f-nuevo"/>
        <span>Marcar como nuevo</span>
      </div>
    </div>

    <div class="ok-msg" id="ok-msg">✓ guardado correctamente</div>
    <button class="save-btn" id="save-btn" onclick="saveProduct()">Agregar producto</button>
    <button class="cancel-btn" id="cancel-btn" onclick="cancelEdit()">Cancelar edición</button>
  </div>

  <!-- PRODUCTS -->
  <div>
    <div class="prod-header">
      <h2>Catálogo</h2>
      <span class="count" id="count">0 productos</span>
    </div>
    <div class="search-wrap">
      <input type="text" id="search-input" placeholder="Buscar por nombre o anime..." oninput="searchProducts()"/>
    </div>
    <div class="prod-table">
      <div class="prod-table-head">
        <div class="th"></div>
        <div class="th">Producto</div>
        <div class="th">Precio</div>
        <div class="th">Editar</div>
        <div class="th">Eliminar</div>
      </div>
      <div id="prod-list"><div class="loading-state">cargando...</div></div>
    </div>
  </div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const app = initializeApp({
    apiKey:"AIzaSyCE67aw3dXHe80OyxUPJ9vuiTkA4DoB3JE",
    authDomain:"hakunastore-22432.firebaseapp.com",
    projectId:"hakunastore-22432",
    storageBucket:"hakunastore-22432.firebasestorage.app",
    messagingSenderId:"380227604585",
    appId:"1:380227604585:web:eb613f8bce797fb045d2f8"
  });
  const auth = getAuth(app);
  const db   = getFirestore(app);

  onAuthStateChanged(auth, user => { if(!user) window.location.href='login.html'; });
  window.logout = async () => { await signOut(auth); window.location.href='login.html'; };

  // ── Detectar si es Harry Potter / Mundo Mágico
  const HP_KEYWORDS = ['harry potter','hogwarts','hermione','voldemort','dumbledore','slytherin','gryffindor','hufflepuff','ravenclaw','potter','mundo magico','wizarding'];
  function isHarryPotter(nombre, anime) {
    const hay = (nombre + ' ' + (anime||'')).toLowerCase();
    return HP_KEYWORDS.some(k => hay.includes(k));
  }

  // ── Badge label
  function badgeNuevo(p) {
    if (!p.nuevo) return '';
    if (isHarryPotter(p.nombre, p.anime)) {
      return '<span class="pill-hp">✦ mundo mágico</span>';
    }
    return '<span class="pill-new">nuevo</span>';
  }

  // ── Image upload
  window.handleImageUpload = function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      const img = new Image();
      img.onload = function() {
        const canvas = document.createElement('canvas');
        const MAX = 600;
        let w = img.width, h = img.height;
        if (w > h) { if (w > MAX) { h = Math.round(h*(MAX/w)); w = MAX; } }
        else        { if (h > MAX) { w = Math.round(w*(MAX/h)); h = MAX; } }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        const b64 = canvas.toDataURL('image/jpeg', 0.80);
        document.getElementById('f-imagen').value = b64;
        const prev = document.getElementById('img-preview');
        prev.src = b64;
        prev.classList.add('show');
        document.getElementById('img-placeholder').style.display = 'none';
        document.getElementById('img-clear-btn').classList.add('show');
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  };

  window.clearImage = function() {
    document.getElementById('f-imagen').value = '';
    document.getElementById('f-img-file').value = '';
    const prev = document.getElementById('img-preview');
    prev.classList.remove('show');
    prev.src = '';
    document.getElementById('img-placeholder').style.display = '';
    document.getElementById('img-clear-btn').classList.remove('show');
  };

  let allProds = [];

  onSnapshot(collection(db,"productos"), snap => {
    allProds = snap.docs.map(d=>({id:d.id,...d.data()}));
    renderList(allProds);
    updateDatalist(allProds);
    document.getElementById('count').textContent = `${allProds.length} producto${allProds.length!==1?'s':''}`;
  });

  function updateDatalist(prods) {
    const animes = [...new Set(prods.map(p=>p.anime).filter(Boolean))].sort();
    document.getElementById('anime-dl').innerHTML = animes.map(a=>`<option value="${a}">`).join('');
  }

  function renderList(prods) {
    const list = document.getElementById('prod-list');
    if (!prods.length) {
      list.innerHTML = `<div class="empty-state"><div class="icon">◌</div><p>Sin productos</p></div>`;
      return;
    }
    list.innerHTML = prods.map(p=>`
      <div class="prow">
        ${p.imagen
          ? `<img class="prow-img" src="${p.imagen}" alt="${p.nombre}"/>`
          : `<div class="prow-emoji-fallback">${p.emoji||'🎭'}</div>`}
        <div>
          <div class="prow-name">${p.nombre}</div>
          <div class="prow-meta">
            <span class="pill">${p.categoria||'figura'}</span>
            ${p.anime?`<span class="pill-anime">${p.anime}</span>`:''}
            ${badgeNuevo(p)}
          </div>
        </div>
        <div class="prow-price">$${Number(p.precio).toLocaleString('es-UY')}</div>
        <button class="ebtn" onclick="editProd('${p.id}')">editar</button>
        <button class="dbtn" onclick="deleteProd('${p.id}','${p.nombre.replace(/'/g,"\'")}')">eliminar</button>
      </div>`).join('');
  }

  window.searchProducts = function() {
    const q = document.getElementById('search-input').value.toLowerCase();
    if (!q) { renderList(allProds); return; }
    renderList(allProds.filter(p =>
      p.nombre.toLowerCase().includes(q) ||
      (p.anime||'').toLowerCase().includes(q) ||
      (p.categoria||'').toLowerCase().includes(q)
    ));
  };

  window.saveProduct = async function() {
    const nombre = document.getElementById('f-nombre').value.trim();
    const anime  = document.getElementById('f-anime').value.trim();
    const precio = document.getElementById('f-precio').value;
    const cat    = document.getElementById('f-cat').value;
    const imagen = document.getElementById('f-imagen').value;
    const nuevo  = document.getElementById('f-nuevo').checked;
    const eid    = document.getElementById('edit-id').value;
    if (!nombre||!precio) { alert('Completá nombre y precio.'); return; }
    const data = {nombre,anime,precio:Number(precio),categoria:cat,imagen,nuevo};
    try {
      if (eid) await updateDoc(doc(db,"productos",eid), data);
      else     await addDoc(collection(db,"productos"), {...data, createdAt:serverTimestamp()});
      showOk(); cancelEdit();
    } catch(e) { alert('Error: '+e.message); }
  };

  window.deleteProd = async function(id,nombre) {
    if (!confirm(`Eliminar "${nombre}"?`)) return;
    const { deleteDoc: dd, doc: dc } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
    await deleteDoc(doc(db,"productos",id));
  };

  window.editProd = function(id) {
    const p = allProds.find(x=>x.id===id); if(!p) return;
    document.getElementById('edit-id').value   = id;
    document.getElementById('f-nombre').value  = p.nombre;
    document.getElementById('f-anime').value   = p.anime||'';
    document.getElementById('f-precio').value  = p.precio;
    document.getElementById('f-cat').value     = p.categoria||'figura';
    document.getElementById('f-imagen').value  = p.imagen||'';
    document.getElementById('f-nuevo').checked = !!p.nuevo;
    const prev = document.getElementById('img-preview');
    const clearBtn = document.getElementById('img-clear-btn');
    if (p.imagen) {
      prev.src = p.imagen; prev.classList.add('show');
      document.getElementById('img-placeholder').style.display = 'none';
      clearBtn.classList.add('show');
    } else {
      prev.classList.remove('show'); prev.src='';
      document.getElementById('img-placeholder').style.display = '';
      clearBtn.classList.remove('show');
    }
    document.getElementById('fp-eyebrow').textContent = 'Editando producto';
    document.getElementById('fp-title').textContent   = 'Modificar datos';
    document.getElementById('save-btn').textContent   = 'Guardar cambios';
    document.getElementById('save-btn').classList.add('edit-mode');
    document.getElementById('cancel-btn').style.display = 'block';
    window.scrollTo({top:0,behavior:'smooth'});
  };

  window.cancelEdit = function() {
    document.getElementById('edit-id').value='';
    ['f-nombre','f-anime','f-precio'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('f-cat').value='figura';
    window.clearImage();
    document.getElementById('f-nuevo').checked=false;
    document.getElementById('fp-eyebrow').textContent = 'Nuevo producto';
    document.getElementById('fp-title').textContent   = 'Agregar al catálogo';
    document.getElementById('save-btn').textContent   = 'Agregar producto';
    document.getElementById('save-btn').classList.remove('edit-mode');
    document.getElementById('cancel-btn').style.display='none';
  };

  function showOk() {
    const m=document.getElementById('ok-msg');
    m.style.display='block';
    setTimeout(()=>m.style.display='none',3000);
  }
</script>
</body>
</html>
