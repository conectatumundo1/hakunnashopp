<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HAKUNA!! — Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --paper:#f7f4ef;--paper2:#f0ece4;--ink:#1a1814;--ink2:#2e2b26;
      --vermilion:#c0392b;--ash:#9a9488;--smoke:#d4cfc6;--smoke2:#e8e3da;
    }
    body{
      min-height:100vh;background:var(--paper);
      display:flex;align-items:center;justify-content:center;
      font-family:'DM Mono',monospace;
      position:relative;overflow:hidden;
    }
    /* Kanji watermark */
    body::before{
      content:'管';
      position:fixed;right:-.05em;bottom:-.1em;
      font-family:'Shippori Mincho',serif;
      font-size:40vw;color:rgba(26,24,20,.025);
      pointer-events:none;line-height:1;user-select:none;
    }
    /* fine grid */
    body::after{
      content:'';position:fixed;inset:0;
      background-image:
        linear-gradient(var(--smoke2) 1px,transparent 1px),
        linear-gradient(90deg,var(--smoke2) 1px,transparent 1px);
      background-size:40px 40px;opacity:.6;pointer-events:none;
    }

    .box{
      background:var(--paper);border:1px solid var(--smoke);
      padding:3.5rem;width:400px;max-width:95vw;
      position:relative;z-index:1;
      animation:up .4s ease;
    }
    @keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

    /* red top bar */
    .box::before{
      content:'';position:absolute;top:0;left:0;right:0;
      height:2px;background:var(--vermilion);
    }

    .logo-wrap{display:flex;align-items:center;gap:1rem;margin-bottom:2.5rem;}
    .logo-img{width:44px;height:44px;object-fit:contain;}
    .logo-jp{
      font-family:'Shippori Mincho',serif;
      font-size:1.3rem;font-weight:700;letter-spacing:.06em;color:var(--ink);
    }
    .logo-jp em{color:var(--vermilion);font-style:normal}
    .logo-en{
      font-size:.55rem;letter-spacing:.2em;text-transform:uppercase;
      color:var(--ash);margin-top:2px;
    }

    .panel-label{
      font-size:.6rem;letter-spacing:.22em;text-transform:uppercase;
      color:var(--ash);margin-bottom:2.2rem;
      display:flex;align-items:center;gap:.6rem;
    }
    .panel-label::before{content:'';display:block;width:24px;height:1px;background:var(--ash);}

    .fg{margin-bottom:1.2rem}
    label{
      display:block;font-size:.6rem;letter-spacing:.16em;
      text-transform:uppercase;color:var(--ash);margin-bottom:.45rem;
    }
    input{
      width:100%;background:var(--paper2);border:1px solid var(--smoke);
      color:var(--ink);padding:.78rem 1rem;
      font-family:'DM Mono',monospace;font-size:.88rem;
      outline:none;transition:border .2s;
    }
    input:focus{border-color:var(--ink);}
    input::placeholder{color:var(--smoke);}

    .err{
      display:none;color:var(--vermilion);
      font-size:.65rem;letter-spacing:.06em;
      margin-bottom:1rem;padding:.55rem .9rem;
      border-left:2px solid var(--vermilion);
      background:rgba(192,57,43,.04);
    }

    .btn-login{
      width:100%;background:var(--ink);color:var(--paper);border:none;
      padding:.95rem;font-family:'DM Mono',monospace;
      font-size:.68rem;letter-spacing:.18em;text-transform:uppercase;
      cursor:pointer;transition:background .2s;margin-top:.3rem;
    }
    .btn-login:hover{background:var(--ink2);}
    .btn-login:disabled{opacity:.4;cursor:not-allowed}

    .back{
      display:block;text-align:center;margin-top:1.8rem;
      color:var(--ash);font-size:.6rem;letter-spacing:.12em;
      text-transform:uppercase;text-decoration:none;transition:color .2s;
    }
    .back:hover{color:var(--vermilion);}
  </style>
</head>

    <div class="panel-label">Acceso restringido</div>

    <div class="fg">
      <label>Email</label>
      <input type="email" id="email" placeholder="admin@hakuna.com" autocomplete="email"/>
    </div>
    <div class="fg">
      <label>Contraseña</label>
      <input type="password" id="pass" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')login()"/>
    </div>
    <div class="err" id="err"></div>
    <button class="btn-login" id="btn" onclick="login()">Ingresar</button>
    <a class="back" href="index.html">← Volver a la tienda</a>
  </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  const app = initializeApp({
    apiKey:"AIzaSyCE67aw3dXHe80OyxUPJ9vuiTkA4DoB3JE",
    authDomain:"hakunastore-22432.firebaseapp.com",
    projectId:"hakunastore-22432",
    storageBucket:"hakunastore-22432.firebasestorage.app",
    messagingSenderId:"380227604585",
    appId:"1:380227604585:web:eb613f8bce797fb045d2f8"
  });
  const auth = getAuth(app);
  onAuthStateChanged(auth, user => { if(user) window.location.href='admin.html'; });
  window.login = async function() {
    const email = document.getElementById('email').value.trim();
    const pass  = document.getElementById('pass').value;
    const btn   = document.getElementById('btn');
    const err   = document.getElementById('err');
    err.style.display = 'none';
    if(!email||!pass){ err.textContent='Completá email y contraseña.'; err.style.display='block'; return; }
    btn.disabled=true; btn.textContent='Ingresando...';
    try {
      await signInWithEmailAndPassword(auth,email,pass);
      window.location.href='admin.html';
    } catch(e) {
      err.textContent='Email o contraseña incorrectos.';
      err.style.display='block';
      btn.disabled=false; btn.textContent='Ingresar';
    }
  };
</script>
